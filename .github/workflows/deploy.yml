name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-functions:
    name: Edge Functions → Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy whatsapp-webhook --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy media-downloader  --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy history-sync      --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-web:
    name: Web → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Deploy to Vercel (production)
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
