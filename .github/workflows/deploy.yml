name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Edge Functions → Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy whatsapp-webhook      --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
          supabase functions deploy media-downloader      --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
          supabase functions deploy session-health-check  --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
          supabase functions deploy history-sync          --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy generate-embeddings   --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy webhook-delivery      --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy delete-session        --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Deploy do web é feito automaticamente pela integração nativa Vercel ↔ GitHub.
  # Vercel detecta push em main e deploya apps/web sem precisar de token ou CI step.
  # Para configurar: Vercel Dashboard → projeto → Settings → Git → conectar repo
  #                  Settings → General → Root Directory → apps/web
